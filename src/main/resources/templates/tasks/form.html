<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${task.id != null} ? 'タスク編集' : '新規タスク'">タスク</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1 th:text="${task.id != null} ? 'タスク編集' : '新規タスク'"></h1>
    </header>
    <div class="container">
        <div class="form-card">
            <form th:action="${task.id != null} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
                  method="post" th:object="${task}">

                <div class="form-group">
                    <label for="title">タイトル <span style="color:#e74c3c">*</span></label>
                    <input type="text" id="title" th:field="*{title}" placeholder="タスクのタイトルを入力">
                    <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="form-group">
                    <label for="description">説明</label>
                    <textarea id="description" th:field="*{description}" placeholder="タスクの詳細を入力（任意）"></textarea>
                    <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"
                            th:text="${task.id != null} ? '更新' : '作成'"></button>
                    <a th:href="@{/tasks}" class="btn btn-secondary">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
